            <p class="info-item"><span class="info-label">类型：</span>悬疑 / 现代 / 单元剧 / 奇幻 / 心理暗黑 / 主受 / NP / 反攻 / 强制爱 / 人外</p>
            <p class="info-item"><span class="info-label">简介：</span>十个杀人犯分尸了他们的爱人，他们的爱人是同一个人。
主角患有重度精神病，同时拥有一项超能力：一旦在现实世界被杀死，便会坠入「里世界」。
里世界中，他发现现实里的一些人对应着相应的怪物；他还发现，重返现实的唯一方法，就是在里世界中，杀死对应现实里直接导致自己死亡的那只怪物。</p>
