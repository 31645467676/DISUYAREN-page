</p>
            <p class="info-item"><span class="info-label">简介：</span>谢北方的初恋是物理学家。他说他学物理就是因为物理界太多帅哥了。青春期看课本上马克斯・普朗克的插图打飞机。高中物理老师也挺帅的，可惜没能和他上过床。不过一直想操到物理老师的愿望，他到大学反而实现了。
谢北方【数学系大学生】X申缪【哲学教授】X龚子歌【物理教授】
虽然涉及很多物理、数学，但其实我主要写和写得好的地方全是哲学。大家不要怕看不懂，因为作者也不是专门学这些的，不会写得太深奥！可以放心看。
</p>
