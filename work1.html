<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作品一：城市叙事</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f5f3 0%, #e6e6e4 100%);
            background-attachment: fixed;
            background-size: cover;
            padding: 60px 20px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
        }
        .card {
            background: #fff;
            border-radius: 12px;
            padding: 48px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
        }
        .work-title {
            font-size: 26px;
            font-weight: 300;
            color: #222;
            margin-bottom: 24px;
            text-align: center;
            letter-spacing: 1px;
        }
        .info-item {
            font-size: 14px;
            color: #555;
            line-height: 2;
            margin-bottom: 12px;
        }
        .info-label {
            color: #222;
            font-weight: 500;
        }
        .back-btn {
            display: block;
            width: 120px;
            height: 40px;
            line-height: 40px;
            text-align: center;
            background: #222;
            color: #fff;
            border-radius: 6px;
            margin: 40px auto 0;
            text-decoration: none;
            font-size: 13px;
            transition: 0.3s;
        }
        .back-btn:hover {
            background: #444;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1 class="work-title">作品一：城市叙事</h1>
            <p class="info-item"><span class="info-label">状态：</span>已完结</p>
            <p class="info-item"><span class="info-label">类型：</span>都市随笔 / 时尚叙事</p>
            <p class="info-item"><span class="info-label">简介：</span>以都市为底色，记录城市里的光影、人群与生活碎片，文字简约克制，贴合现代时尚审美。</p>
            <a href="index.html" class="back-btn">返回主页</a>
        </div>
    </div>
</body>
</html>
