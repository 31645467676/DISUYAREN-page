 <!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人创作主页 | 低俗雅人</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        /* 全屏自适应高级背景 - 都市杂志风 */
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f5f3 0%, #e6e6e4 100%);
            background-attachment: fixed;
            background-size: cover;
            padding: 60px 20px;
        }
        /* 页面容器 */
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        /* 头部标题 - 极简杂志排版 */
        .header {
            text-align: center;
            margin-bottom: 60px;
        }
        .title {
            font-size: 28px;
            font-weight: 300;
            color: #222;
            letter-spacing: 2px;
            margin-bottom: 12px;
        }
        .subtitle {
            font-size: 14px;
            color: #666;
            letter-spacing: 1px;
        }
        /* 作品列表 - 极简卡片，添加超方便 */
        .work-list {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        /* 作品卡片 - 时尚杂志质感 */
        .work-item {
            background: #ffffff;
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .work-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }
        .work-name {
            font-size: 20px;
            font-weight: 400;
            color: #222;
            margin-bottom: 8px;
        }
        .work-info {
            font-size: 13px;
            color: #888;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1 class="title">工作敲代码 | 爱好敲键盘</h1>
            <p class="subtitle">PORTFOLIO · 个人作品合集</p>
        </div>

        <!-- 作品列表 → 添加作品：复制下面一行即可！ -->
        <div class="work-list">
            <!-- 作品1 -->
            <div class="work-item" onclick="location.href='work1.html'">
                <div class="work-name">作品一:《物数昧东西》</div>
                <div class="work-info">学术救赎 | 连载中</div>
            </div>
            <!-- 作品2 -->
            <div class="work-item" onclick="location.href='work2.html'">
                <div class="work-name">作品二:《我们杀的爱人是同一个人》</div>
                <div class="work-info">暗黑悬疑 | 连载中</div>
            </div>
            <!-- 作品3 -->
            <div class="work-item" onclick="location.href='work3.html'">
                <div class="work-name">作品三:《月黑放火》</div>
                <div class="work-info">市井救赎 | 待开坑</div>
            </div>
            <!-- 新增作品：直接复制上面的代码，修改文字+跳转链接 -->
            <!-- <div class="work-item" onclick="location.href='work3.html'">
                <div class="work-name">作品三：自定义名称</div>
                <div class="work-info">分类 | 状态</div>
            </div> -->
        </div>
    </div>
</body>
</html>
